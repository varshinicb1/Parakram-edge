name: Android CI (Continuous Integration)

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'
      - 'bugfix/**'
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (JDK 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Verify Code Compilation & Build Cache
        uses: gradle/actions/setup-gradle@v3
        with:
          arguments: :app:compileDebugKotlin :app:compileDebugJavaWithJavac

      - name: Run Unit & Robolectric Tests
        run: ./gradlew :app:testDebugUnitTest --info

      - name: Upload JUnit Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-test-reports
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocket-edge-server-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
