name: Android Release (CD)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Release Version Name (e.g., 1.2.0)'
        required: true
        default: '1.0.0'

jobs:
  release:
    name: Build & Package Release Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug & Release APKs
        run: ./gradlew assembleDebug assembleRelease

      - name: Build Release Bundle (AAB)
        run: ./gradlew bundleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: pocket-edge-server-release-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 14

      - name: Upload Release AAB (Android App Bundle)
        uses: actions/upload-artifact@v4
        with:
          name: pocket-edge-server-release-bundle
          path: app/build/outputs/bundle/release/app-release-unsigned.aab
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
            app/build/outputs/bundle/release/app-release-unsigned.aab
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
